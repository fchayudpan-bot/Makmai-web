<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .head { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .sub { color: var(--ink-600); font-size: 12px; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--cream-100); border: 1.5px solid var(--forest-500); }
  .item .lab { font-family: var(--font-mono); font-size: 10px; color: var(--ink-700); font-weight: 600; }
  .item .px  { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-600); }
</style></head>
<body>
  <div class="head">Border radii</div>
  <div class="sub">Soft and organic. Sharp 0px corners are never used in product UI.</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="lab">xs</span><span class="px">4px</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="lab">sm</span><span class="px">8px</span></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><span class="lab">md</span><span class="px">12px</span></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><span class="lab">lg</span><span class="px">16px</span></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><span class="lab">xl</span><span class="px">24px</span></div>
    <div class="item"><div class="box" style="border-radius:32px"></div><span class="lab">2xl</span><span class="px">32px</span></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><span class="lab">pill</span><span class="px">∞</span></div>
  </div>
  <div class="sub" style="margin-top:18px;margin-bottom:0">
    Defaults: chips → <code style="font-family:var(--font-mono);font-size:11px">sm</code>, buttons → <code style="font-family:var(--font-mono);font-size:11px">md</code> or <code style="font-family:var(--font-mono);font-size:11px">pill</code>,
    inputs/cards → <code style="font-family:var(--font-mono);font-size:11px">lg</code>, hero panels → <code style="font-family:var(--font-mono);font-size:11px">xl/2xl</code>.
  </div>
</body></html>
