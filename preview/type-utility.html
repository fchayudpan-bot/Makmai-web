<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .head { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .sub { color: var(--ink-600); font-size: 12px; margin-bottom: 16px; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .cell { background: var(--cream-100); border: 1px solid var(--cream-300); border-radius: 14px; padding: 18px 20px; }
  .cell .eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--forest-500); margin-bottom: 8px; }
  .cell .title { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.15; color: var(--ink-900); letter-spacing: -0.01em; }
  .cell .price { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--forest-500); font-variant-numeric: tabular-nums; margin-top: 8px; }
  .cell .strike { font-family: var(--font-display); font-weight: 500; font-size: 16px; color: var(--ink-600); text-decoration: line-through; margin-left: 8px; }
  .cell .cap { margin-top: 6px; font-size: 12px; color: var(--ink-600); font-family: var(--font-body); }
</style></head>
<body>
  <div class="head">Eyebrow · Price · Caption</div>
  <div class="sub">Three small but high-frequency styles. Price uses tabular numerals so columns of prices align.</div>
  <div class="pair">
    <div class="cell">
      <div class="eyebrow">เมนูแนะนำ · SIGNATURE</div>
      <div class="title">น้ำส้มแครอท ขิงสด</div>
      <div><span class="price">฿89</span><span class="strike">฿110</span></div>
      <div class="cap">ขวด 350ml · พร้อมรับที่สาขา</div>
    </div>
    <div class="cell">
      <div class="eyebrow">NEW · เมนูใหม่</div>
      <div class="title">สลัดอกไก่ย่าง</div>
      <div><span class="price">฿145</span></div>
      <div class="cap">โปรตีนสูง 32g · เหมาะกับมื้อกลางวัน</div>
    </div>
  </div>
</body></html>
