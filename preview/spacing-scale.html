<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .head { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .sub { color: var(--ink-600); font-size: 12px; margin-bottom: 16px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: grid; grid-template-columns: 60px 1fr 50px; align-items: center; gap: 12px; }
  .row .lab { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); font-weight: 600; }
  .row .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-700); text-align: right; }
  .bar { height: 16px; background: var(--forest-500); border-radius: 4px; }
</style></head>
<body>
  <div class="head">Spacing scale — 4px base</div>
  <div class="sub">Use these step values for padding, margin, and gap. Cards typically use space-6 or space-8; sections use space-12+.</div>
  <div class="stack">
    <div class="row"><span class="lab">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
    <div class="row"><span class="lab">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
    <div class="row"><span class="lab">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
    <div class="row"><span class="lab">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
    <div class="row"><span class="lab">space-5</span><div class="bar" style="width:20px"></div><span class="px">20px</span></div>
    <div class="row"><span class="lab">space-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
    <div class="row"><span class="lab">space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
    <div class="row"><span class="lab">space-10</span><div class="bar" style="width:40px"></div><span class="px">40px</span></div>
    <div class="row"><span class="lab">space-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
    <div class="row"><span class="lab">space-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
    <div class="row"><span class="lab">space-24</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
  </div>
</body></html>
