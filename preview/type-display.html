<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .head .title { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
  .head .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }
  .specimen .th { font-family: var(--font-display); font-weight: 700; font-size: 64px; line-height: 1; color: var(--forest-500); letter-spacing: -0.02em; }
  .specimen .en { font-family: var(--font-display); font-weight: 700; font-size: 48px; line-height: 1.05; color: var(--ink-900); letter-spacing: -0.02em; margin-top: 6px; }
  .glyphs { margin-top: 16px; font-family: var(--font-display); font-size: 18px; color: var(--ink-700); display: flex; gap: 14px; flex-wrap: wrap; }
  .glyphs span { background: var(--cream-100); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--cream-300); }
  .weights { margin-top: 12px; display: flex; gap: 18px; font-family: var(--font-display); font-size: 14px; color: var(--ink-700); }
  .weights b { font-weight: inherit; }
</style></head>
<body>
  <div class="head"><div class="title">Display — Bai Jamjuree</div><div class="meta">Google Fonts · TH + Latin · weights 400/500/600/700</div></div>
  <div class="specimen">
    <div class="th">หมากไม้</div>
    <div class="en">Fresh from the grove</div>
  </div>
  <div class="glyphs">
    <span>ก ข ค ง</span><span>ม า ก ไ ม้</span><span>A B C a b c</span><span>0 1 2 3 ฿</span>
  </div>
  <div class="weights">
    <span style="font-weight:400"><b>400</b> Regular</span>
    <span style="font-weight:500"><b>500</b> Medium</span>
    <span style="font-weight:600"><b>600</b> Semibold</span>
    <span style="font-weight:700"><b>700</b> Bold</span>
  </div>
</body></html>
