<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Charmonman:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { padding: 0; background: var(--cream-50); display: flex; align-items: center; justify-content: center; min-height: 260px; }
  .stage { display: flex; align-items: center; gap: 28px; padding: 24px 32px; }
  .logo-wrap { width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .meta { display: flex; flex-direction: column; gap: 10px; max-width: 360px; }
  .name-th { font-family: 'Charm', serif; font-weight: 700; font-size: 52px; color: var(--forest-500); line-height: 1; letter-spacing: 0.01em; }
  .name-en { font-family: 'Charm', serif; font-weight: 700; font-size: 20px; letter-spacing: 0.22em; color: var(--bark-500); text-transform: uppercase; }
  .desc { color: var(--ink-700); font-size: 13px; line-height: 1.55; font-family: var(--font-body); }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--forest-50); color: var(--forest-700); border-radius: 999px; font-size: 11px; font-weight: 600; align-self: flex-start; font-family: var(--font-body); }
</style></head>
<body>
  <div class="stage">
    <div class="logo-wrap"><img src="../assets/logo-makmai-full.png" alt="Makmai logo"></div>
    <div class="meta">
      <span class="pill">Primary logo · 1:1 lockup</span>
      <div>
        <div class="name-th">หมากไม้</div>
        <div class="name-en">Mak-Mai</div>
      </div>
      <p class="desc">Wordmark uses <strong>Charm</strong> (Google Fonts) to mirror the logo's traditional Thai serif. Use the full lockup on cream / light surfaces with at least 24px clear-space around it. Never recolor — the green and brown are the brand.</p>
    </div>
  </div>
</body></html>
